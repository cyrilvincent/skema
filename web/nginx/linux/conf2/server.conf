# Remettre d'abord le nginx.conf limité à 6 core

server {
	listen       80;
	server_name  _;  # *.chair-paas.com chaire-paas.com localhost;
	access_log  /home/cyrilvincent/skema/web/nginx/linux/logs/host.access.log  main;
	error_log  /home/cyrilvincent/skema/web/nginx/linux/logs/host.access.log  error;

 	# return 301 https://localhost$request_uri

 	# Copilot

#     server {
#         listen 80;
#         server_name chaire_paas.com www.chaire_paas.com localhost;
#
#         # Redirection vers HTTPS (recommandé)
#         return 301 https://$host$request_uri;
#     }


    location /api/ {
        proxy_pass http://127.0.0.1:8000/; # bien mettre le / à la fin
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

	location / {
		root   /home/cyrilvincent/skema/web/nginx/linux/html;
		index  index.html;
		try_files $uri $uri/ /index.html; # Evite les 404 si accès direct car SPA
	}

	error_page  404              /404.html;
	error_page  500 502 503 504  /50x.html;
}

