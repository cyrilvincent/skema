server {

	listen 80 default_server; # default_server = fallback à enlever quand il y aura chaire_paas
	listen [::]:80 default_server; #IPv6
	server_name _; # Fallback

	access_log  /home/cyrilvincent/skema/web/nginx/linux/logs/host.access.log  main;
	error_log  /home/cyrilvincent/skema/web/nginx/linux/logs/host.access.log  error;

    # 	root /var/www/html;
    root /home/cyrilvincent/skema/web/nginx/linux/html;

	index index.html index.htm;

    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

	location /api/ {
        proxy_pass http://127.0.0.1:8000/; # bien mettre le / à la fin
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

    }

	location / {
		try_files $uri $uri/ / =404;
	}

	error_page  404              /404.html;
	error_page  500 502 503 504  /50x.html;
}

