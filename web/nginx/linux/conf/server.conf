server {
    if ($host = chaire-paas.dev.skema.edu) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

	listen 80 default_server;
	listen [::]:80 default_server;
	server_name chaire-paas.dev.skema.edu;
    return 404; # managed by Certbot
}

server {
	server_name chaire-paas.dev.skema.edu; # A changer, gérer le www

	access_log  /home/cyrilvincent/skema/web/nginx/linux/logs/host.access.log  main;
	error_log  /home/cyrilvincent/skema/web/nginx/linux/logs/host.access.log  error;

    root /home/cyrilvincent/skema/web/nginx/linux/html;

	index index.html index.htm;

    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

	location /api/ {
        proxy_pass http://127.0.0.1:8000/; # bien mettre le / à la fin
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        limit_req zone=api_limit burst=20;

    }

	location / {
		try_files $uri $uri/ / =404;
		limit_req zone=api_limit burst=20;
	}

	error_page  404              /404.html;
	error_page  500 502 503 504  /50x.html;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chaire-paas.dev.skema.edu/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chaire-paas.dev.skema.edu/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}



