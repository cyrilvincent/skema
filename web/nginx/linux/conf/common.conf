# log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
#                   '$status $body_bytes_sent "$http_referer" '
#                   '"$http_user_agent" "$http_x_forwarded_for"';
# access_log  /home/cyrilvincent/skema/web/nginx/linux/logs/access.log  main;
# error_log /home/cyrilvincent/skema/web/nginx/linux/logs/error.log  error;
charset utf-8;
sendfile on; # Ne pas mettre off
tcp_nopush on; # Il faut peut être ajouter tcp_nodelay on;
types_hash_max_size 2048;
include /etc/nginx/mime.types;
default_type application/octet-stream;
ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
ssl_prefer_server_ciphers on;
access_log /var/log/nginx/access.log;
