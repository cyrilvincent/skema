server {
	listen       80;
	server_name  *.chaire_paas.com localhost;
	access_log  C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/logs/host.access.log  main;
	error_log  C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/logs/host.access.log  error;


    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

	location / {
		root   C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/html;
		index  index.html;
	}

	error_page  404              /404.html;
	error_page  500 502 503 504  /50x.html;
}

