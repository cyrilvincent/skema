server {
	listen 80 default_server;
	listen [::]:80 default_server;
    server_name chaire-paas.com www.chaire-paas.com localhost;
	access_log  C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/logs/host.access.log  main;
	error_log  C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/logs/host.access.log  error;
	root   C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/html;
	index index.html;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s; # Tester 10s
    proxy_read_timeout 300s;

    location /api1/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 300s;
        limit_req zone=api_limit burst=10 nodelay;
    }

	location / {

	    location ~ ^/(apl|sae|sae2|research|members|partners|sustain|account|publication|studies)(/.*)?$ {
            try_files $uri $uri/ /index.html;
        }

		try_files $uri $uri/ =404; # virer /index.html
		limit_req zone=api_limit burst=20; #
	}

	error_page  404              /404.html;
	error_page  500 502 503 504  /50x.html;
}
