log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
access_log  C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/logs/access.log  main;
error_log C:/Users/conta/git-CVC/Skema/git-skema/web/nginx/windows/logs/error.log  error;
charset utf-8;

sendfile        on;
tcp_nopush     on;
keepalive_timeout  65;
keepalive_requests 1000;

ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
ssl_prefer_server_ciphers on;

gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
