# SHOW config_file;
# /etc/postgresql/17/main/postgresql.conf
# -------- Mémoire --------
shared_buffers = 2GB # 25% RAM si server only
effective_cache_size = 8GB # 50 à 75%
work_mem = 16MB
maintenance_work_mem = 512MB

# -------- Connexions --------
max_connections = 100 # Peut monter à 300 avec work_mem=8 mais j'ai beaucoup de grosses requetes, si on augmente work_mem par 2 on divise par 2 max_connection

# -------- CPU --------
max_worker_processes = 4
max_parallel_workers =4
max_parallel_workers_per_gather = 2

# -------- WAL / Checkpoints --------
wal_buffers  32MB # 16 pour copilot 64 pour claude
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# -------- Autovacuum --------
autovacuum = on
autovacuum_max_workers = 1
autovacuum_naptime = 10s

# -------- SSD --------
random_page_cost = 1.1
effective_io_concurrency = 200