<div [class]="service.isMobile() ? 'mobile-banner' : 'banner'" style="background-image: linear-gradient(rgba(0,0,0,0)), url('img/banner-light.jpg')">
    <div class="logo" >
        <div [class]="service.isMobile() ? 'mobile-skema' : 'skema'" style="background-image: url('img/skema_black.png')">
            <div [class]="service.isMobile() ? 'mobile-univ' : 'univ'" style="background-image: url('img/univ.png')">
                <div class="logo-block">
                    <a routerLink="/">
                        <span  [class]="service.isMobile() ? 'mobile-title' : 'title'">{{title}}</span>
                    </a>
                </div> 
            </div>
        </div>
    </div>  
</div>
