<form>
    <mat-form-field class="full-width">
        <mat-label>Identifiant</mat-label>
        <input matInput [formControl]="loginControl">
    </mat-form-field>
    <mat-form-field class="full-width">
        <mat-label>Mot de passe</mat-label>
        <input matInput [type]="hide() ? 'password' : 'text'" [formControl]="pwdControl" />
        <button
            matIconButton
            matSuffix
            (click)="clickEvent($event)"
            [attr.aria-label]="'Cacher le mot de passe'"
            [attr.aria-pressed]="hide()"
        >
        <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
    </mat-form-field>
    <div class="center">
        <button type="button" mat-fab extended (click)="buttonClicked()">Se connecter</button>
    </div>
    @if (badLogin()) {
        <div class="center">
            Identifiant inconnu ou mauvais mot de passe
        </div>
    }
    
</form>
