  <div #myPlot>
    @if(visible() && plotlyReady()) {
      <plotly-plot #plotEl
        [data]="data()"
        [layout]="layout()"
        [config]="config()"
        [frames]="frames()"
        (buttonClicked)="onSliderClicked($event)"
        [useResizeHandler]="true" [style]="{position: 'relative', width: '100%', height: '100%'}">
      </plotly-plot>
    }
  </div>
