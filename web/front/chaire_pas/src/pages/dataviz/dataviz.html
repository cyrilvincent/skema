<div>
    <div>
        <form>

            <p><app-searchbox2 (selectedCodesEvent)="selectedCodes($event)"  [type]="type()"></app-searchbox2></p>
            <p><app-dataviz-parameters 
                    [type]="type()"
                    [codes]="getCodes()"
                    [disabled]="selectedCode() == null && codes().length == 0" 
                    (okEvent)="ok2($event)" 
                    [sae2]="sae2()"
                    [label]="codes().length > 0 ? codes()[0][1] : null">
                </app-dataviz-parameters></p>
            <mat-divider></mat-divider>
            <app-geo-dataviz [type]="type()" [geoType]="geoType()" [dto]="dto2()" [label]="label()" [sae2]="sae2()"></app-geo-dataviz>
        </form>
    </div>
